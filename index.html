<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedAxis Retail — Operations Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --bg4: #30363d;
  --border: rgba(240,246,252,0.1);
  --border2: rgba(240,246,252,0.18);
  --text: #e6edf3;
  --text2: #8b949e;
  --text3: #6e7681;
  --accent: #2ea043;
  --accent2: #3fb950;
  --blue: #388bfd;
  --blue2: #58a6ff;
  --amber: #d29922;
  --amber2: #e3b341;
  --red: #da3633;
  --red2: #f85149;
  --purple: #8957e5;
  --purple2: #a5d6ff;
  --teal: #1f6feb;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --radius: 8px;
  --radius-lg: 12px;
  --sidebar-w: 220px;
  --topbar-h: 56px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;overflow:hidden}

/* ─── LAYOUT ─────────────────────────────── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{height:var(--topbar-h);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:24px}

/* ─── LOGIN ──────────────────────────────── */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100}
.login-card{width:380px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:36px}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.login-logo .icon{width:36px;height:36px;background:linear-gradient(135deg,#2ea043,#1a7a2e);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.login-logo h1{font-size:20px;font-weight:600;letter-spacing:-0.3px}
.login-logo span{font-size:11px;color:var(--text2);display:block;margin-top:1px}
.field-group{margin-bottom:16px}
.field-group label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500;letter-spacing:0.3px;text-transform:uppercase}
.field-group input,.field-group select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 12px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .15s}
.field-group input:focus,.field-group select:focus{border-color:var(--accent)}
.login-hint{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:16px;font-size:12px;color:var(--text2)}
.login-hint .demo-row{display:flex;justify-content:space-between;margin-bottom:4px}
.login-hint .demo-row:last-child{margin-bottom:0}
.login-hint .tag{background:var(--bg4);padding:1px 6px;border-radius:4px;font-family:var(--mono);font-size:11px;color:var(--text)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--radius);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:none;outline:none}
.btn-primary{background:var(--accent);color:#fff;width:100%}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2)}
.btn-secondary:hover{background:var(--bg4)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:rgba(218,54,51,0.15);color:var(--red2);border:1px solid rgba(218,54,51,0.3)}
.btn-danger:hover{background:rgba(218,54,51,0.25)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{width:30px;height:30px;padding:0;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2)}
.btn-icon:hover{color:var(--text);background:var(--bg4)}

/* ─── SIDEBAR ─────────────────────────────── */
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-logo{display:flex;align-items:center;gap:8px}
.sidebar-logo .icon{width:28px;height:28px;background:linear-gradient(135deg,#2ea043,#1a7a2e);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sidebar-logo h2{font-size:14px;font-weight:600;letter-spacing:-0.2px}
.sidebar-logo span{font-size:10px;color:var(--text3);display:block}
nav{flex:1;overflow-y:auto;padding:8px}
.nav-section{margin-bottom:4px}
.nav-section-label{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:0.8px;text-transform:uppercase;padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:6px;cursor:pointer;transition:all .12s;color:var(--text2);font-size:13px;font-weight:400;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(46,160,67,0.15);color:var(--accent2);font-weight:500}
.nav-item .icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-item .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 5px;border-radius:10px;font-family:var(--mono)}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.user-card{display:flex;align-items:center;gap:8px}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ─── TOPBAR ─────────────────────────────── */
.page-title{font-size:15px;font-weight:600;flex:1;letter-spacing:-0.2px}
.topbar-actions{display:flex;align-items:center;gap:8px}
.store-select{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:5px 10px;color:var(--text2);font-family:var(--sans);font-size:12px;outline:none;cursor:pointer}
.store-select:focus{border-color:var(--accent)}
.notif-badge{position:relative;display:inline-flex}
.notif-dot{position:absolute;top:2px;right:2px;width:7px;height:7px;background:var(--red2);border-radius:50%;border:1.5px solid var(--bg2)}

/* ─── CARDS ──────────────────────────────── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px}
.card-sm{padding:14px 16px}
.card-title{font-size:12px;font-weight:500;color:var(--text2);letter-spacing:0.3px;text-transform:uppercase;margin-bottom:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.kpi-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.kpi-label{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:0.3px;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.kpi-value{font-size:24px;font-weight:600;letter-spacing:-0.5px;line-height:1}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:4px}
.kpi-up{color:var(--accent2)}
.kpi-down{color:var(--red2)}
.kpi-warn{color:var(--amber2)}

/* ─── TABLES ─────────────────────────────── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:0.4px;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.mono{font-family:var(--mono);font-size:12px}

/* ─── BADGES ─────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;gap:4px}
.badge-green{background:rgba(46,160,67,0.15);color:var(--accent2)}
.badge-red{background:rgba(218,54,51,0.15);color:var(--red2)}
.badge-amber{background:rgba(210,153,34,0.15);color:var(--amber2)}
.badge-blue{background:rgba(56,139,253,0.15);color:var(--blue2)}
.badge-purple{background:rgba(137,87,229,0.15);color:#b083f0}
.badge-gray{background:var(--bg4);color:var(--text2)}

/* ─── ALERTS & NOTIFICATIONS ─────────────── */
.alert-item{display:flex;align-items:flex-start;gap:10px;padding:12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);margin-bottom:8px;transition:all .15s}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.alert-dot.red{background:var(--red2)}
.alert-dot.amber{background:var(--amber2)}
.alert-dot.blue{background:var(--blue2)}
.alert-title{font-size:13px;font-weight:500;margin-bottom:2px}
.alert-sub{font-size:12px;color:var(--text3)}

/* ─── CHART BARS ─────────────────────────── */
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:12px;color:var(--text2);width:160px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bar-val{font-size:12px;font-family:var(--mono);color:var(--text2);width:80px;text-align:right;flex-shrink:0}

/* ─── TREND LINE ─────────────────────────── */
.sparkline{display:flex;align-items:flex-end;gap:3px;height:40px}
.spark-bar{flex:1;background:rgba(46,160,67,0.4);border-radius:2px 2px 0 0;transition:height .4s}
.spark-bar:last-child{background:var(--accent2)}

/* ─── INVENTORY ──────────────────────────── */
.stock-level{display:flex;align-items:center;gap:8px}
.stock-bar{width:60px;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;flex-shrink:0}
.stock-fill{height:100%;border-radius:3px}
.stock-ok{background:var(--accent)}
.stock-warn{background:var(--amber)}
.stock-crit{background:var(--red2)}

/* ─── TRANSFERS ──────────────────────────── */
.transfer-flow{display:flex;align-items:center;gap:8px;font-size:12px}
.transfer-store{background:var(--bg4);padding:3px 8px;border-radius:4px;font-weight:500}
.transfer-arrow{color:var(--text3)}

/* ─── AI PANEL ───────────────────────────── */
.chat-container{display:flex;flex-direction:column;height:420px}
.chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:12px}
.msg{max-width:85%;padding:10px 13px;border-radius:10px;font-size:13px;line-height:1.5}
.msg-user{align-self:flex-end;background:rgba(46,160,67,0.15);border:1px solid rgba(46,160,67,0.25);color:var(--text)}
.msg-ai{align-self:flex-start;background:var(--bg3);border:1px solid var(--border);color:var(--text)}
.msg-meta{font-size:10px;color:var(--text3);margin-top:4px;font-family:var(--mono)}
.chat-input-row{display:flex;gap:8px;margin-top:auto}
.chat-input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 12px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s}
.chat-input:focus{border-color:var(--accent)}
.suggestion-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{background:var(--bg4);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--text2);cursor:pointer;transition:all .12s}
.chip:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}

/* ─── FORMS ──────────────────────────────── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:500;color:var(--text2);margin-bottom:5px;letter-spacing:0.3px;text-transform:uppercase}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 11px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(2px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:24px;width:460px;max-height:80vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:600}

/* ─── STATUS INDICATORS ──────────────────── */
.pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ─── ANOMALY CARDS ──────────────────────── */
.anomaly-card{border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;background:var(--bg3);transition:all .15s}
.anomaly-card.high{border-left:3px solid var(--red2)}
.anomaly-card.medium{border-left:3px solid var(--amber2)}
.anomaly-card.resolved{opacity:0.5}
.anomaly-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.anomaly-score{font-family:var(--mono);font-size:11px;color:var(--text3);margin-top:4px}

/* ─── SCROLLBAR ──────────────────────────── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}

/* ─── LOADING ─────────────────────────────── */
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text3);font-size:13px;gap:8px}
.spinner{width:16px;height:16px;border:2px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── SECTION SPACING ─────────────────────── */
.section{margin-bottom:24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:14px;font-weight:600;letter-spacing:-0.2px;display:flex;align-items:center;gap:8px}
.divider{height:1px;background:var(--border);margin:20px 0}

/* ─── ANIMATIONS ─────────────────────────── */
.fade-in{animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:12px 16px;font-size:13px;z-index:200;display:flex;align-items:center;gap:8px;animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ──────────────────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">⚕</div>
      <div>
        <h1>MedAxis Retail</h1>
        <span>Pharmacy Operations Platform</span>
      </div>
    </div>
    <div class="login-hint">
      <div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.3px">Demo credentials</div>
      <div class="demo-row"><span>admin@medaxis.in</span><span class="tag">admin123</span></div>
      <div class="demo-row"><span>supervisor@medaxis.in</span><span class="tag">super123</span></div>
      <div class="demo-row"><span>pharma@medaxis.in</span><span class="tag">pharma123</span></div>
      <div class="demo-row"><span>inventory@medaxis.in</span><span class="tag">inv123</span></div>
    </div>
    <div class="field-group">
      <label>Email</label>
      <input type="email" id="login-email" value="admin@medaxis.in" placeholder="Enter email">
    </div>
    <div class="field-group">
      <label>Password</label>
      <input type="password" id="login-password" value="admin123" placeholder="Enter password">
    </div>
    <button class="btn btn-primary" onclick="doLogin()" id="login-btn">Sign in</button>
    <div id="login-error" style="color:var(--red2);font-size:12px;margin-top:10px;text-align:center;display:none"></div>
  </div>
</div>

<!-- ── MAIN APP ──────────────────────────────────────────────────────────── -->
<div id="app" style="display:none">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="icon">⚕</div>
        <div>
          <h2>MedAxis</h2>
          <span>37 stores · Hyderabad</span>
        </div>
      </div>
    </div>
    <nav>
      <div class="nav-section">
        <div class="nav-section-label">Operations</div>
        <button class="nav-item active" onclick="navigate('dashboard')">
          <span class="icon">▦</span> Dashboard
        </button>
        <button class="nav-item" onclick="navigate('inventory')">
          <span class="icon">⊞</span> Inventory
        </button>
        <button class="nav-item" onclick="navigate('billing')">
          <span class="icon">◈</span> Billing / POS
        </button>
        <button class="nav-item" onclick="navigate('transfers')">
          <span class="icon">⇄</span> Stock Transfers
          <span class="badge" id="transfer-badge">1</span>
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-section-label">Monitoring</div>
        <button class="nav-item" onclick="navigate('alerts')">
          <span class="icon">◎</span> Alerts
          <span class="badge" id="alert-badge">4</span>
        </button>
        <button class="nav-item" onclick="navigate('expiry')">
          <span class="icon">◷</span> Expiry Mgmt
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-section-label">Intelligence</div>
        <button class="nav-item" onclick="navigate('ai')">
          <span class="icon">◉</span> AI Insights
        </button>
        <button class="nav-item" onclick="navigate('reports')">
          <span class="icon">◫</span> Reports
        </button>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar" id="sidebar-avatar">A</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-name">Loading...</div>
          <div class="user-role" id="sidebar-role">—</div>
        </div>
        <button class="btn-icon" onclick="doLogout()" title="Logout" style="font-size:12px">⏻</button>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <div class="page-title" id="page-title">Dashboard</div>
      <div class="topbar-actions">
        <select class="store-select" id="store-filter" onchange="onStoreChange()">
          <option value="">All Stores</option>
        </select>
        <div class="notif-badge">
          <button class="btn-icon" onclick="navigate('alerts')" title="Alerts">🔔</button>
          <div class="notif-dot" id="notif-dot"></div>
        </div>
        <button class="btn btn-sm btn-secondary" onclick="navigate('billing')">+ New Sale</button>
      </div>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- ── MODAL ──────────────────────────────────────────────────────────────── -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal-content" onclick="event.stopPropagation()"></div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
const API = 'http://localhost:8000';
let token = null, currentUser = null, currentPage = 'dashboard', selectedStore = '';
let dashboardData = null;

// ── API helpers ───────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = {method, headers: {'Content-Type':'application/json'}};
  if (token) opts.headers['Authorization'] = `Bearer ${token}`;
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(API + path, opts);
    if (r.status === 401) { doLogout(); return null; }
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || 'Request failed'); }
    return r.json();
  } catch(e) {
    if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
      // Use mock data if backend not running
      return mockResponse(method, path, body);
    }
    showToast('⚠ ' + e.message, 'amber');
    return null;
  }
}

function fmt_currency(n) { return '₹' + Number(n).toLocaleString('en-IN', {maximumFractionDigits:0}); }
function fmt_date(s) { return new Date(s).toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'2-digit'}); }
function fmt_time(s) { return new Date(s).toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'}); }
function role_label(r) {
  return {superadmin:'Super Admin',regional_supervisor:'Regional Supervisor',pharmacist:'Pharmacist',inventory_controller:'Inventory Controller'}[r]||r;
}
function initials(n) { return (n||'U').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase(); }

function showToast(msg, type='green') {
  const t = document.createElement('div');
  const c = {green:'var(--accent2)',amber:'var(--amber2)',red:'var(--red2)'}[type]||'var(--accent2)';
  t.className='toast'; t.style.borderLeftColor=c; t.style.borderLeftWidth='3px';
  t.innerHTML = msg; document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(10px)';t.style.transition='all .3s';setTimeout(()=>t.remove(),300)}, 2500);
}

// ── Auth ──────────────────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  btn.textContent = 'Signing in...'; btn.disabled = true;
  const r = await api('POST', '/auth/login', {email, password});
  btn.textContent = 'Sign in'; btn.disabled = false;
  if (!r) { document.getElementById('login-error').style.display='block'; document.getElementById('login-error').textContent='Invalid credentials'; return; }
  token = r.access_token; currentUser = r.user;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('sidebar-name').textContent = currentUser.name;
  document.getElementById('sidebar-role').textContent = role_label(currentUser.role);
  document.getElementById('sidebar-avatar').textContent = initials(currentUser.name);
  await loadStores(); navigate('dashboard');
}

async function doLogout() {
  await api('POST', '/auth/logout');
  token=null; currentUser=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}

async function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(b=>{
    b.classList.toggle('active', b.textContent.trim().toLowerCase().startsWith(
      {dashboard:'dashboard',inventory:'inventory',billing:'billing',transfers:'stock',
       alerts:'alerts',expiry:'expiry',ai:'ai',reports:'reports'}[page]||page));
  });
  const titles = {dashboard:'Dashboard',inventory:'Inventory',billing:'Billing & POS',
    transfers:'Stock Transfers',alerts:'Alerts & Notifications',expiry:'Expiry Management',
    ai:'AI Insights',reports:'Reports & Analytics'};
  document.getElementById('page-title').textContent = titles[page]||page;
  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div> Loading...</div>';
  const pages = {dashboard:renderDashboard, inventory:renderInventory, billing:renderBilling,
    transfers:renderTransfers, alerts:renderAlerts, expiry:renderExpiry, ai:renderAI, reports:renderReports};
  if (pages[page]) await pages[page]();
}

async function renderInventory() {
  const qs = selectedStore ? `?store_id=${selectedStore}` : '';
  const stock = await api('GET', `/inventory/stock${qs}`);
  if (!stock) return;

  const cats = [...new Set(stock.map(i=>i.category))];
  let activeFilter = '';

  function render(filter) {
    const filtered = filter ? stock.filter(i=>i.category===filter) : stock;
    const tbody = filtered.map(i=>{
      const pct = Math.min(100, Math.round(i.qty_on_hand / (i.reorder_point*3) * 100));
      const cls = i.qty_on_hand <= i.reorder_point*0.3 ? 'stock-crit' : i.qty_on_hand <= i.reorder_point ? 'stock-warn' : 'stock-ok';
      const badge = i.qty_on_hand <= i.reorder_point*0.3 ? '<span class="badge badge-red">Critical</span>' :
                    i.qty_on_hand <= i.reorder_point ? '<span class="badge badge-amber">Low</span>' :
                    '<span class="badge badge-green">OK</span>';
      return `<tr>
        <td><div style="font-weight:500">${i.name}</div><div style="font-size:11px;color:var(--text3)">${i.sku_id}</div></td>
        <td><span class="badge badge-gray">${i.category}</span></td>
        <td style="display:none" class="store-col">${i.store_name}</td>
        <td>
          <div class="stock-level">
            <div class="stock-bar"><div class="stock-fill ${cls}" style="width:${pct}%"></div></div>
            <span class="mono">${i.qty_on_hand}</span>
          </div>
        </td>
        <td class="mono">${i.reorder_point}</td>
        <td>${badge}</td>
        <td class="mono">${fmt_currency(i.price)}</td>
        <td><button class="btn btn-sm btn-ghost" onclick="openForecast('${i.sku_id}','${i.name}')">Forecast</button></td>
      </tr>`;
    }).join('');
    document.getElementById('inv-tbody').innerHTML = tbody;
    if (!selectedStore) document.querySelectorAll('.store-col').forEach(el=>el.style.display='');
    document.querySelectorAll('.cat-filter').forEach(b=>b.classList.toggle('active',b.dataset.cat===filter));
  }

  document.getElementById('content').innerHTML = `
  <div class="fade-in">
  <div class="section-header">
    <div class="section-title">Stock Levels <span class="badge badge-gray">${stock.length} items</span></div>
    <div style="display:flex;gap:8px">
      <input id="inv-search" type="text" placeholder="Search products..." style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;color:var(--text);font-size:13px;width:200px;outline:none" oninput="filterInventory(this.value)">
      <button class="btn btn-sm btn-secondary" onclick="navigate('alerts')">View alerts</button>
    </div>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
    <button class="btn btn-sm btn-ghost cat-filter active" data-cat="" onclick="renderCat('')">All</button>
    ${cats.map(c=>`<button class="btn btn-sm btn-ghost cat-filter" data-cat="${c}" onclick="renderCat('${c}')">${c}</button>`).join('')}
  </div>
  <div class="card" style="padding:0">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Product</th><th>Category</th>
            ${!selectedStore?'<th class="store-col">Store</th>':''}
            <th>Stock</th><th>Reorder Pt</th><th>Status</th><th>Price</th><th></th>
          </tr>
        </thead>
        <tbody id="inv-tbody"></tbody>
      </table>
    </div>
  </div>
  </div>`;

  window.renderCat = (cat) => { activeFilter=cat; render(cat); };
  window.filterInventory = (q) => {
    const rows = document.querySelectorAll('#inv-tbody tr');
    rows.forEach(r => r.style.display = r.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none');
  };
  render('');
}

async function openForecast(skuId, skuName) {
  openModal('<div class="loading"><div class="spinner"></div> Running forecast model...</div>');
  const f = await api('GET', `/ai/forecast/${skuId}`);
  if (!f) return;
  const maxP = Math.max(...f.predictions.map(p=>p.predicted_units));
  document.getElementById('modal-content').innerHTML = `
  <div class="modal-header">
    <div class="modal-title">📊 Demand Forecast — ${skuName}</div>
    <button class="btn-icon" onclick="closeModal()">✕</button>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    <span class="badge badge-blue">${f.model}</span>
    <span class="badge badge-green">Confidence: ${Math.round(f.confidence*100)}%</span>
  </div>
  <div style="margin-bottom:16px">
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.3px;font-weight:500">14-Day Forecast</div>
    <div style="display:flex;align-items:flex-end;gap:2px;height:60px">
      ${f.predictions.map(p=>`<div style="flex:1;background:rgba(46,160,67,0.5);border-radius:2px 2px 0 0;height:${Math.round(p.predicted_units/maxP*100)}%;cursor:pointer" title="${p.date}: ${p.predicted_units} units"></div>`).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px">
      <span>${f.predictions[0].date}</span><span>${f.predictions[f.predictions.length-1].date}</span>

}

          <div style="display:flex;justify-content:space-between;font-size:13px;padding-top:8px;border-top:1px solid var(--border)"><span style="font-weight:500">Net revenue</span><span class="mono" style="font-weight:600;color:var(--accent2)">${fmt_currency(130460)}</span></div>
        </div>
      </div>
    </div>
  </div>
  </div>`;

    let cartItems = [];

      if (!cartItems.length) return '<div style="color:var(--text3);font-size:12px;padding:10px 0">No items added yet</div>';

      <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">
        <span>${it.name}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="mono">${it.qty} × ${fmt_currency(it.price)}</span>
          <button class="btn-icon" onclick="removeItem(${i})" style="font-size:10px;width:22px;height:22px">✕</button>
        </div>
      </div>`).join('');
    }
    function totalHtml() {
      const sub = cartItems.reduce((a,i)=>a+i.price*i.qty,0);
      const gst = sub*0.12;
      return `<div style="padding-top:8px;font-size:13px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--text2)">Subtotal</span><span class="mono">${fmt_currency(sub)}</span></div>
        <div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="color:var(--text2)">GST (12%)</span><span class="mono">${fmt_currency(gst)}</span></div>
        <div style="display:flex;justify-content:space-between;font-weight:600"><span>Total</span><span class="mono" style="color:var(--accent2)">${fmt_currency(sub+gst)}</span></div>
      </div>`;
    }
    openModal(`
    <div class="modal-header">
      <div class="modal-title">New Sale</div>
      <button class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Store</label>
        <select id="sale-store">${stores.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}</select>
      </div>
      <div class="form-group">
        <label>Payment</label>
        <select id="sale-payment"><option>UPI</option><option>Cash</option><option>Card</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Product</label>
        <select id="sale-sku">${(products||[]).map(p=>`<option value="${p.sku_id}" data-price="${p.price}">${p.name}</option>`).join('')}</select>
      </div>
      <div class="form-group">
        <label>Quantity</label>
        <input type="number" id="sale-qty" value="1" min="1">
      </div>
    </div>
    <button class="btn btn-secondary" style="width:100%;margin-bottom:14px" onclick="addToCart()">+ Add to cart</button>
    <div style="font-size:12px;color:var(--text2);font-weight:500;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.3px">Cart</div>
    <div id="sale-cart">${cartHtml()}</div>
    <div id="sale-total"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="flex:1" onclick="submitSale()">Complete Sale</button>
    </div>`);

    window.addToCart = () => {
      const sel = document.getElementById('sale-sku');
      const price = parseFloat(sel.options[sel.selectedIndex].dataset.price);
      const qty = parseInt(document.getElementById('sale-qty').value)||1;
      const existing = cartItems.find(i=>i.sku_id===sel.value);
      if (existing) existing.qty += qty;
      else cartItems.push({sku_id:sel.value, name:sel.options[sel.selectedIndex].text, price, qty});
      document.getElementById('sale-cart').innerHTML = cartHtml();
      document.getElementById('sale-total').innerHTML = totalHtml();
    };
    window.removeItem = (idx) => {
      cartItems.splice(idx,1);
      document.getElementById('sale-cart').innerHTML = cartHtml();
      document.getElementById('sale-total').innerHTML = cartItems.length ? totalHtml() : '';
    };
    window.submitSale = async () => {
      if (!cartItems.length) { showToast('Add items to cart first','amber'); return; }
      const r = await api('POST','/billing/sales',{
        store_id: document.getElementById('sale-store').value,
        items: cartItems.map(i=>({sku_id:i.sku_id,qty:i.qty})),
        payment_mode: document.getElementById('sale-payment').value
      });
      if (r) { closeModal(); showToast(`✓ Invoice ${r.sale_id} created — ${fmt_currency(r.grand_total)}`); navigate('billing'); }
    };
  };
}

// ── AI Insights ───────────────────────────────────────────────────────────
async function renderAI() {
  const [anomalies, products] = await Promise.all([
    api('GET','/ai/anomalies'),
    api('GET','/inventory/products')
  ]);

  let messages = [{role:'ai', text:'Hello! I\'m the MedAxis AI assistant. I can answer questions about inventory, sales, anomalies, and forecasts across all 37 stores. Try asking me something.', source:'system', ts: new Date()}];

  function msgHtml(m) {
    return m.role === 'user'
      ? `<div class="msg msg-user">${m.text}</div>`
      : `<div class="msg msg-ai">${m.text}${m.source?`<div class="msg-meta">source: ${m.source} · confidence: ${m.confidence||'—'}</div>`:''}</div>`;
  }

  function renderMessages() {
    const box = document.getElementById('chat-msgs');
    if (box) { box.innerHTML = messages.map(msgHtml).join(''); box.scrollTop = box.scrollHeight; }
  }

  const unresolved = (anomalies||[]).filter(a=>!a.resolved);

  document.getElementById('content').innerHTML = `
  <div class="fade-in">
  <div class="grid-2">
    <div class="card">
      <div class="card-title">Conversational query</div>
      <div class="suggestion-chips">
        <div class="chip" onclick="askQuery('Which products are low on stock?')">Low stock status</div>
        <div class="chip" onclick="askQuery('What is today\\'s revenue?')">Revenue today</div>
        <div class="chip" onclick="askQuery('Show expiry wastage risk')">Expiry risk</div>
        <div class="chip" onclick="askQuery('Pending stock transfers?')">Pending transfers</div>
        <div class="chip" onclick="askQuery('What are the top fast-moving products?')">Fast movers</div>
      </div>
      <div class="chat-container">
        <div class="chat-messages" id="chat-msgs">${messages.map(msgHtml).join('')}</div>
        <div class="chat-input-row">
          <input class="chat-input" id="chat-input" placeholder="Ask about inventory, sales, or operations..." onkeydown="if(event.key==='Enter')sendQuery()">
          <button class="btn btn-primary btn-sm" onclick="sendQuery()">Ask</button>
        </div>
      </div>
    </div>

    <div>
      <div class="card section">
        <div class="card-title">Active anomaly flags <span class="badge badge-red" style="margin-left:4px">${unresolved.length}</span></div>
        ${unresolved.length === 0 ? '<div style="color:var(--text3);font-size:13px">No active anomalies 🎉</div>' :
          unresolved.map(a=>`
          <div style="padding:10px;background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:8px;border-left:3px solid ${a.severity==='high'?'var(--red2)':'var(--amber2)'}">
            <div style="font-size:12px;font-weight:500;margin-bottom:3px">${a.description}</div>
            <div style="font-size:11px;color:var(--text3)">${(a.store_name||'').replace('MedAxis - ','')} · score ${a.score}</div>
          </div>`).join('')}
      </div>

      <div class="card">
        <div class="card-title">Quick forecast</div>
        <div class="form-group">
          <label>Select Product</label>
          <select id="fc-sku" style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;color:var(--text);font-size:13px;width:100%;outline:none">
            ${(products||[]).map(p=>`<option value="${p.sku_id}">${p.name}</option>`).join('')}
          </select>
        </div>
        <button class="btn btn-secondary" style="width:100%" onclick="openForecast(document.getElementById('fc-sku').value, document.getElementById('fc-sku').options[document.getElementById('fc-sku').selectedIndex].text)">Run Forecast Model</button>
      </div>
    </div>
  </div>
  </div>`;

  window.askQuery = async (q) => {
    document.getElementById('chat-input').value = q;
    await sendQuery();
  };

  window.sendQuery = async () => {
    const input = document.getElementById('chat-input');
    const q = input.value.trim();
    if (!q) return;
    messages.push({role:'user', text:q});
    input.value = '';
    renderMessages();
    const r = await api('POST','/ai/query',{question:q});
    if (r) messages.push({role:'ai', text:r.answer, source:r.data_source, confidence:`${Math.round((r.confidence||0)*100)}%`});
    renderMessages();
  };
}

// ── Reports ───────────────────────────────────────────────────────────────
async function renderReports() {
  const d = await api('GET','/reports/dashboard');
  if (!d) return;
  const maxR = Math.max(...d.store_revenue.map(s=>s.revenue));

  document.getElementById('content').innerHTML = `
  <div class="fade-in">
  <div class="section">
    <div class="section-title" style="margin-bottom:14px">Business Intelligence — Month to Date</div>
    <div class="grid-4" style="margin-bottom:20px">
      <div class="kpi-card"><div class="kpi-label">Total Revenue</div><div class="kpi-value">${fmt_currency(d.kpis.month_revenue)}</div><div class="kpi-sub kpi-up">↑ ${d.kpis.yoy_growth}% YoY</div></div>
      <div class="kpi-card"><div class="kpi-label">Active Stores</div><div class="kpi-value">${d.kpis.active_stores}</div><div class="kpi-sub" style="color:var(--text3)">of 37 total</div></div>
      <div class="kpi-card"><div class="kpi-label">Wastage Risk</div><div class="kpi-value kpi-warn">₹7,200</div><div class="kpi-sub" style="color:var(--text3)">6 expiring batches</div></div>
      <div class="kpi-card"><div class="kpi-label">Avg Sale Value</div><div class="kpi-value">₹433</div><div class="kpi-sub kpi-up">↑ 8.2% vs last month</div></div>
    </div>
  </div>

  <div class="grid-2 section">
    <div class="card">
      <div class="card-title">Store revenue breakdown</div>
      <div class="bar-chart">
        ${d.store_revenue.map(s=>`
        <div class="bar-row">
          <div class="bar-label">${s.store_name.replace('MedAxis - ','')}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round(s.revenue/maxR*100)}%;background:var(--blue)"></div></div>
          <div class="bar-val">${fmt_currency(s.revenue)}</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Category mix (units sold)</div>
      ${[['Analgesics','34%','var(--accent)'],['Antidiabetic','22%','var(--blue)'],['Antibiotics','18%','var(--purple)'],['Cardiac','12%','var(--amber)'],['Others','14%','var(--bg4)']].map(([cat,pct,clr])=>`
      <div class="bar-row" style="margin-bottom:10px">
        <div class="bar-label">${cat}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct};background:${clr}"></div></div>
        <div class="bar-val">${pct}</div>
      </div>`).join('')}
    </div>
  </div>

  <div class="card section">
    <div class="section-header" style="margin-bottom:12px">
      <div class="card-title" style="margin-bottom:0">Top 5 fast-moving products</div>
      <button class="btn btn-sm btn-ghost" onclick="showToast('Export feature in full build')">Export CSV</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Rank</th><th>Product</th><th>Units Sold</th><th>Revenue</th><th>% of Total</th></tr></thead>
        <tbody>
          ${d.top_products.map((p,i)=>{
            const pct = Math.round(p.revenue/d.kpis.month_revenue*100*10)/10;
            return `<tr>
              <td class="mono" style="color:var(--text3)">#${i+1}</td>
              <td style="font-weight:500">${p.name}</td>
              <td class="mono">${p.units_sold.toLocaleString()}</td>
              <td class="mono">${fmt_currency(p.revenue)}</td>
              <td><div style="display:flex;align-items:center;gap:8px"><div class="bar-track" style="width:80px"><div class="bar-fill" style="width:${pct*5}%;background:var(--accent)"></div></div><span class="mono">${pct}%</span></div></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>
  </div>`;
}

// ── Modal helpers ─────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').style.display = 'none';
}

// ── Boot ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.getElementById('login-password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
</script>
</body>
</html>
